<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示詞抓取器 (Prompt Grabber)</title>
    <!-- 引入 Tailwind CSS 進行快速、現代化的樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // 啟用基於 class 的暗色模式
            theme: {
                extend: {
                    fontFamily: {
                        // 套用微軟正黑體 UI (Microsoft JhengHei UI)
                        sans: ['"Microsoft JhengHei UI"', '"Microsoft JhengHei"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#E0DED8',
                            card: '#F5F4F2',
                            border: '#8B7979',
                            main: '#1A1A1A',
                            sub: '#6B6B6B',
                            link: '#245B61',
                            primary: '#0F5E67',
                            secondary: '#3ABACB',
                            accent: '#D9A940',
                            positive: '#279042',
                            negative: '#DD5A5A'
                        }
                    }
                }
            }
        }
    </script>
    <!-- 引入 Phosphor Icons 作為按鈕圖示 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .drop-zone-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
        .dark .drop-zone-active {
            background-color: rgba(59, 130, 246, 0.1) !important;
        }
    </style>
</head>
<body class="bg-brand-bg dark:bg-slate-900 min-h-screen text-brand-main dark:text-slate-200 font-sans p-4 md:p-8 flex flex-col items-center justify-start transition-colors duration-300">

    <div class="max-w-4xl w-full bg-brand-card dark:bg-slate-800 rounded-2xl shadow-sm border border-brand-border dark:border-slate-700 p-6 md:p-8 relative">
        
        <!-- 右上角工具列 (說明 & 日夜切換 & 語系切換) -->
        <div class="absolute top-4 right-4 flex gap-2">
            <button id="langBtn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-brand-main dark:text-slate-200 border border-brand-border dark:border-slate-600 rounded-full hover:bg-brand-bg dark:hover:bg-slate-700 transition-colors">
                <i class="ph ph-translate text-brand-positive text-lg"></i> <span id="langText">EN</span>
            </button>
            <button id="helpBtn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-brand-main dark:text-slate-200 border border-brand-border dark:border-slate-600 rounded-full hover:bg-brand-bg dark:hover:bg-slate-700 transition-colors">
                <i class="ph ph-book-open text-brand-primary text-lg"></i> <span id="i18n-help">說明</span>
            </button>
            <button id="themeBtn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-brand-main dark:text-slate-200 border border-brand-border dark:border-slate-600 rounded-full hover:bg-brand-bg dark:hover:bg-slate-700 transition-colors">
                <i class="ph ph-sun text-brand-accent text-lg" id="themeIcon"></i> <span id="themeText">亮色</span>
            </button>
        </div>

        <!-- 標題區 -->
        <header class="text-center mb-8 mt-12 md:mt-4 md:mb-8 flex flex-col items-center">
            <img src="https://upload.cc/i1/2026/01/29/BauOeN.png" alt="CIS Logo" class="h-16 mb-4 object-contain">
            <h1 class="text-3xl font-bold text-brand-primary dark:text-white flex items-center justify-center gap-2">
                <span id="i18n-title">提示詞抓取器</span>
            </h1>
            <p id="i18n-subtitle" class="text-brand-sub dark:text-slate-400 mt-2 text-sm md:text-base">上傳圖片，AI 將自動為您解析並生成高質量的繪圖提示詞。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- 左側：上傳與預覽區 -->
            <div class="flex flex-col gap-4">
                
                <!-- 拖曳上傳區 -->
                <div id="dropZone" class="relative border-2 border-dashed border-brand-border dark:border-slate-600 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-brand-bg dark:hover:bg-slate-700/50 transition-colors h-64 group">
                    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp, image/heic" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    
                    <div id="uploadPlaceholder" class="flex flex-col items-center pointer-events-none">
                        <i class="ph ph-upload-simple text-4xl text-brand-sub dark:text-slate-500 group-hover:text-brand-primary transition-colors mb-3"></i>
                        <span id="i18n-dropText" class="font-medium text-brand-main dark:text-slate-300">點擊或拖曳圖片至此</span>
                        <span id="i18n-dropSubText" class="text-sm text-brand-sub dark:text-slate-500 mt-1">支援 PNG, JPG, WEBP</span>
                    </div>

                    <!-- 圖片預覽 (初始隱藏) -->
                    <img id="imagePreview" class="absolute inset-0 w-full h-full object-contain p-2 hidden rounded-xl" alt="Preview Image">
                </div>

                <!-- 深度分析選項 -->
                <div class="bg-brand-bg dark:bg-slate-900 border border-brand-border dark:border-slate-700 p-4 rounded-xl flex flex-col gap-3">
                    <label class="flex items-start gap-3 cursor-pointer group/card relative p-1">
                        <input type="checkbox" id="detailCheck" class="mt-1 rounded text-brand-primary focus:ring-brand-primary bg-brand-card dark:bg-slate-700 border-brand-border dark:border-slate-600 w-4 h-4 cursor-pointer">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-1.5">
                                <span id="i18n-detailTitle" class="text-sm font-medium text-brand-main dark:text-slate-200 group-hover/card:text-brand-primary dark:group-hover/card:text-blue-400 transition-colors">啟用「細節描述」完整分析</span>
                                <i class="ph ph-info text-brand-sub group-hover/card:text-brand-primary transition-colors"></i>
                            </div>
                            <span id="i18n-detailSub" class="text-xs text-brand-sub dark:text-slate-400 mt-1">深度解析：主體輪廓、服裝配件、動作場景與鏡頭風格</span>
                        </div>
                        <!-- Tooltip -->
                        <div class="absolute z-50 left-8 top-full mt-1 invisible opacity-0 group-hover/card:visible group-hover/card:opacity-100 transition-all duration-300 w-64 bg-brand-primary dark:bg-slate-100 text-white dark:text-slate-800 text-xs rounded-lg p-3 shadow-xl pointer-events-none">
                            <div class="absolute -top-1 left-4 w-2 h-2 bg-brand-primary dark:bg-slate-100 rotate-45"></div>
                            <span id="i18n-detailTooltip">【差異說明】側重於「整體畫面」的建構，適合生成具有故事性的完整場景，與詳細五官選項可疊加使用。</span>
                        </div>
                    </label>
                    
                    <div class="w-full h-px bg-brand-border/30 dark:bg-slate-700"></div>

                    <label class="flex items-start gap-3 cursor-pointer group/card relative p-1">
                        <input type="checkbox" id="facialCheck" class="mt-1 rounded text-brand-primary focus:ring-brand-primary bg-brand-card dark:bg-slate-700 border-brand-border dark:border-slate-600 w-4 h-4 cursor-pointer">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-1.5">
                                <span id="i18n-facialTitle" class="text-sm font-medium text-brand-main dark:text-slate-200 group-hover/card:text-brand-primary dark:group-hover/card:text-blue-400 transition-colors">啟用「詳細五官」特寫分析</span>
                                <i class="ph ph-info text-brand-sub group-hover/card:text-brand-primary transition-colors"></i>
                            </div>
                            <span id="i18n-facialSub" class="text-xs text-brand-sub dark:text-slate-400 mt-1">深度解析：人種、臉型、膚色、髮型/色、眼型/瞳孔、額頭、臉頰、下巴、耳朵、鼻型/鼻翼/鼻尖、唇形與眉毛</span>
                        </div>
                        <!-- Tooltip -->
                        <div class="absolute z-50 left-8 top-full mt-1 invisible opacity-0 group-hover/card:visible group-hover/card:opacity-100 transition-all duration-300 w-64 bg-brand-primary dark:bg-slate-100 text-white dark:text-slate-800 text-xs rounded-lg p-3 shadow-xl pointer-events-none">
                            <div class="absolute -top-1 left-4 w-2 h-2 bg-brand-primary dark:bg-slate-100 rotate-45"></div>
                            <span id="i18n-facialTooltip">【差異說明】側重於「臉部特徵」的極度細化，適合生成特寫人物肖像，或需要精確控制長相時使用。</span>
                        </div>
                    </label>
                </div>

                <!-- 快速風格模板區塊 -->
                <div class="bg-brand-bg dark:bg-slate-900 border border-brand-border dark:border-slate-700 p-4 rounded-xl flex flex-col gap-3">
                    <div class="flex items-center gap-1.5 mb-1">
                        <i class="ph ph-lightning text-brand-accent text-lg"></i>
                        <span id="i18n-tplTitle" class="text-sm font-bold text-brand-main dark:text-slate-200">快速風格模板</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button class="tpl-btn px-3 py-1.5 text-xs font-medium bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 rounded-lg hover:bg-brand-bg dark:hover:bg-slate-700 hover:border-brand-primary dark:hover:border-blue-500 transition-colors text-brand-main dark:text-slate-200 shadow-sm" data-tpl="ecommerce"><span id="i18n-tpl1">電商產品主圖</span></button>
                        <button class="tpl-btn px-3 py-1.5 text-xs font-medium bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 rounded-lg hover:bg-brand-bg dark:hover:bg-slate-700 hover:border-brand-primary dark:hover:border-blue-500 transition-colors text-brand-main dark:text-slate-200 shadow-sm" data-tpl="social"><span id="i18n-tpl2">社群媒體情境</span></button>
                        <button class="tpl-btn px-3 py-1.5 text-xs font-medium bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 rounded-lg hover:bg-brand-bg dark:hover:bg-slate-700 hover:border-brand-primary dark:hover:border-blue-500 transition-colors text-brand-main dark:text-slate-200 shadow-sm" data-tpl="tech"><span id="i18n-tpl3">前衛科技發佈</span></button>
                        <button class="tpl-btn px-3 py-1.5 text-xs font-medium bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 rounded-lg hover:bg-brand-bg dark:hover:bg-slate-700 hover:border-brand-primary dark:hover:border-blue-500 transition-colors text-brand-main dark:text-slate-200 shadow-sm" data-tpl="minimal"><span id="i18n-tpl4">高階極簡型錄</span></button>
                        <button class="tpl-btn px-3 py-1.5 text-xs font-medium bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 rounded-lg hover:bg-brand-bg dark:hover:bg-slate-700 hover:border-brand-primary dark:hover:border-blue-500 transition-colors text-brand-main dark:text-slate-200 shadow-sm" data-tpl="b2b"><span id="i18n-tpl5">B2B工程圖解</span></button>
                    </div>
                </div>

                <!-- 進階提示詞優化區塊 -->
                <div class="bg-brand-bg dark:bg-slate-900 border border-brand-border dark:border-slate-700 p-4 rounded-xl flex flex-col gap-3">
                    <div class="flex items-center gap-1.5 mb-1">
                        <i class="ph ph-sliders-horizontal text-brand-primary text-lg"></i>
                        <span id="i18n-advTitle" class="text-sm font-bold text-brand-main dark:text-slate-200">進階提示詞優化</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <!-- 畫面比例 -->
                        <div class="flex flex-col gap-1">
                            <label id="i18n-optRatio" class="text-xs text-brand-sub dark:text-slate-400 font-medium">畫面比例</label>
                            <select id="advRatio" class="p-2 rounded-lg bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 text-brand-main dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-primary">
                                <option value="" id="optAutoRatio">預設 (Auto)</option>
                                <option value="--ar 1:1">1:1 (Square)</option>
                                <option value="--ar 16:9">16:9 (Landscape)</option>
                                <option value="--ar 9:16">9:16 (Portrait)</option>
                                <option value="--ar 4:3">4:3 (Classic)</option>
                                <option value="--ar 3:4">3:4 (Photo)</option>
                            </select>
                        </div>
                        
                        <!-- 藝術風格 -->
                        <div class="flex flex-col gap-1">
                            <label id="i18n-optStyle" class="text-xs text-brand-sub dark:text-slate-400 font-medium">藝術風格</label>
                            <select id="advStyle" class="p-2 rounded-lg bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 text-brand-main dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-primary">
                                <option value="" id="optAutoStyle">預設 (Auto)</option>
                                <option value="photo" id="i18n-optStylePhoto">極致擬真 (Photorealistic)</option>
                                <option value="3d" id="i18n-optStyle3D">3D渲染 (3D Render)</option>
                                <option value="cine" id="i18n-optStyleCine">電影感 (Cinematic)</option>
                                <option value="anime" id="i18n-optStyleAnime">動漫風 (Anime)</option>
                            </select>
                        </div>

                        <!-- 光影氛圍 -->
                        <div class="flex flex-col gap-1">
                            <label id="i18n-optLight" class="text-xs text-brand-sub dark:text-slate-400 font-medium">光影氛圍</label>
                            <select id="advLight" class="p-2 rounded-lg bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 text-brand-main dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-primary">
                                <option value="" id="optAutoLight">預設 (Auto)</option>
                                <option value="studio" id="i18n-optLightStudio">攝影棚打光 (Studio)</option>
                                <option value="cine" id="i18n-optLightCine">電影光 (Cinematic)</option>
                                <option value="golden" id="i18n-optLightGolden">黃金時刻 (Golden Hour)</option>
                                <option value="vol" id="i18n-optLightVol">體積光 (Volumetric)</option>
                            </select>
                        </div>

                        <!-- 鏡頭視角 -->
                        <div class="flex flex-col gap-1">
                            <label id="i18n-optCam" class="text-xs text-brand-sub dark:text-slate-400 font-medium">鏡頭視角</label>
                            <select id="advCam" class="p-2 rounded-lg bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 text-brand-main dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-primary">
                                <option value="" id="optAutoCam">預設 (Auto)</option>
                                <option value="macro" id="i18n-optCamMacro">特寫/微距 (Macro)</option>
                                <option value="wide" id="i18n-optCamWide">廣角 (Wide Angle)</option>
                                <option value="iso" id="i18n-optCamIso">等距視角 (Isometric)</option>
                            </select>
                        </div>

                        <!-- 色調美學 -->
                        <div class="flex flex-col gap-1 col-span-2">
                            <label id="i18n-optColor" class="text-xs text-brand-sub dark:text-slate-400 font-medium">色調美學</label>
                            <select id="advColor" class="p-2 rounded-lg bg-brand-card dark:bg-slate-800 border border-brand-border dark:border-slate-600 text-brand-main dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-primary">
                                <option value="" id="optAutoColor">預設 (Auto)</option>
                                <option value="neon" id="i18n-optColorNeon">霓虹/賽博龐克 (Cyberpunk)</option>
                                <option value="pastel" id="i18n-optColorPastel">柔和粉色 (Pastel)</option>
                                <option value="mono" id="i18n-optColorMono">單色調 (Monochromatic)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="analyzeBtn" disabled class="w-full bg-brand-primary hover:bg-brand-secondary disabled:bg-brand-border dark:disabled:bg-slate-700 disabled:text-brand-sub disabled:cursor-not-allowed text-white font-medium py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-scan text-xl"></i>
                    <span id="i18n-analyzeBtn">分析圖片</span>
                </button>
            </div>

            <!-- 右側：結果區 -->
            <div class="flex flex-col h-full relative gap-4">
                
                <!-- 英文結果區 -->
                <div class="flex flex-col flex-1 relative">
                    <label class="font-medium text-brand-main dark:text-slate-300 mb-2 flex items-center justify-between">
                        <span class="flex items-center gap-2"><i class="ph ph-text-align-left text-brand-primary"></i> <span id="i18n-enPrompt">英文提示詞</span></span>
                        <button id="copyEnBtn" disabled class="text-sm text-brand-link hover:text-brand-secondary dark:text-blue-400 dark:hover:text-blue-300 disabled:text-brand-sub dark:disabled:text-slate-600 flex items-center gap-1 transition-colors"><i class="ph ph-copy"></i> <span id="i18n-copyEn">複製</span></button>
                    </label>
                    <textarea id="englishResult" readonly placeholder="..." class="w-full flex-grow min-h-[120px] p-4 bg-brand-bg dark:bg-slate-900 border border-brand-border dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-primary resize-none text-brand-main dark:text-slate-300 text-sm leading-relaxed"></textarea>
                </div>

                <!-- 中文對照區 -->
                <div class="flex flex-col flex-1 relative">
                    <label class="font-medium text-brand-main dark:text-slate-300 mb-2 flex items-center justify-between">
                        <span class="flex items-center gap-2"><i class="ph ph-translate text-brand-primary"></i> <span id="i18n-zhPrompt">中文對照</span></span>
                        <button id="copyZhBtn" disabled class="text-sm text-brand-link hover:text-brand-secondary dark:text-blue-400 dark:hover:text-blue-300 disabled:text-brand-sub dark:disabled:text-slate-600 flex items-center gap-1 transition-colors"><i class="ph ph-copy"></i> <span id="i18n-copyZh">複製</span></button>
                    </label>
                    <textarea id="chineseResult" readonly placeholder="..." class="w-full flex-grow min-h-[120px] p-4 bg-brand-bg dark:bg-slate-900 border border-brand-border dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-primary resize-none text-brand-main dark:text-slate-300 text-sm leading-relaxed"></textarea>
                </div>
                
                <!-- 載入中遮罩 -->
                <div id="loadingOverlay" class="absolute inset-0 bg-brand-card/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-xl hidden flex-col items-center justify-center border border-brand-border dark:border-slate-700 z-20">
                    <i class="ph ph-spinner-gap animate-spin text-4xl text-brand-primary mb-3"></i>
                    <p id="i18n-loading" class="text-brand-sub dark:text-slate-300 font-medium animate-pulse">AI 正在深度解析圖片細節...</p>
                </div>

                <!-- 下載按鈕 -->
                <div class="flex flex-col mt-2">
                    <button id="downloadBtn" disabled class="w-full bg-brand-bg dark:bg-slate-700 hover:bg-brand-border/20 dark:hover:bg-slate-600 disabled:bg-brand-bg dark:disabled:bg-slate-800 disabled:text-brand-sub dark:disabled:text-slate-600 disabled:cursor-not-allowed text-brand-main dark:text-slate-200 font-medium py-3 px-4 rounded-xl transition-colors flex items-center justify-center border border-brand-border gap-2">
                        <i class="ph ph-download-simple text-lg"></i>
                        <span id="i18n-downloadBtn">下載 TXT (含中英對照)</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- 版權頁尾 -->
    <footer class="mt-8 text-center text-sm text-brand-sub dark:text-slate-400 pb-4">
        v0.0.9 | &copy; 2026 <span class="font-medium text-brand-main dark:text-slate-300">BSD_Homemade</span>
    </footer>

    <!-- 說明視窗 Modal -->
    <div id="helpModal" class="fixed inset-0 z-50 hidden bg-brand-main/50 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity">
        <div class="bg-brand-card dark:bg-slate-800 rounded-2xl shadow-xl max-w-lg w-full p-6 relative border border-brand-border dark:border-slate-700 max-h-[90vh] overflow-y-auto">
            <button id="closeHelpBtn" class="absolute top-4 right-4 text-brand-sub hover:text-brand-main dark:hover:text-slate-200 transition-colors">
                <i class="ph ph-x text-2xl"></i>
            </button>
            <h2 class="text-2xl font-bold text-brand-main dark:text-white mb-4 flex items-center gap-2">
                <i class="ph ph-book-open text-brand-primary"></i> <span id="i18n-modalTitle">使用說明</span>
            </h2>
            <div id="i18n-modalContent" class="space-y-4 text-brand-sub dark:text-slate-300 text-sm leading-relaxed">
                <!-- 內容由 JS 動態載入以支援多國語系 -->
            </div>
        </div>
    </div>

    <!-- 訊息提示彈窗 -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-800 dark:bg-white text-white dark:text-slate-800 px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-4 pointer-events-none flex items-center gap-2 z-50">
        <i class="ph ph-check-circle text-green-400 text-xl"></i>
        <span id="toastMsg" class="font-medium">操作成功</span>
    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const detailCheck = document.getElementById('detailCheck');
        const facialCheck = document.getElementById('facialCheck');
        const englishResult = document.getElementById('englishResult');
        const chineseResult = document.getElementById('chineseResult');
        const copyEnBtn = document.getElementById('copyEnBtn');
        const copyZhBtn = document.getElementById('copyZhBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Modal & Theme & Lang Elements
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');

        // --- API & Retry Logic ---
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `HTTP Error: ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === maxRetries) throw err;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

                showToast('Generation failed. / 生成失敗。', 'error');
            } finally {
                analyzeBtn.disabled = false;
                loadingOverlay.classList.add('hidden');
            }
        });

        // --- Clipboard & Download Functionality ---
        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(i18n[currentLang].toastCopySuccess, 'success');
            } catch (err) {
                showToast(i18n[currentLang].toastCopyFail, 'error');
            } finally {
                textArea.remove();
            }
        }

        copyEnBtn.addEventListener('click', () => {
            if (englishResult.value) copyToClipboard(englishResult.value);
        });

        copyZhBtn.addEventListener('click', () => {
            if (chineseResult.value) copyToClipboard(chineseResult.value);
        });

        downloadBtn.addEventListener('click', () => {
            if (!englishResult.value) return;
            
            const content = `【English Prompt】\n${englishResult.value}\n\n【中文對照】\n${chineseResult.value}`;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = `Prompt_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 0);
            
            showToast(i18n[currentLang].toastDownload, 'success');
        });

        // --- Toast Notifications ---
        let toastTimeout;
        function showToast(message, type = 'success') {
            toastMsg.textContent = message;
            
            const icon = toast.querySelector('i');
            if (type === 'success') {
                icon.className = 'ph ph-check-circle text-brand-positive dark:text-green-500 text-xl';
            } else {
                icon.className = 'ph ph-warning-circle text-brand-negative dark:text-red-500 text-xl';
            }

            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }
    </script>
</body>
</html>
